<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شات المهندس</title>
    <!-- تم تحديث رابط المكتبة للإصدار المستقر 4.7.2 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 10px; height: 95vh; display: flex; flex-direction: column; }
        h3 { text-align: center; color: gold; margin-top: 5px; }
        #chat { flex-grow: 1; border: 1px solid #444; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #000; border-radius: 8px; }
        .controls { display: flex; gap: 5px; }
        input { flex-grow: 1; padding: 12px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #007bff; color: white; cursor: pointer; }
        .msg { margin: 8px 0; padding: 5px; border-bottom: 1px solid #333; }
        .admin-name { color: gold; font-weight: bold; }
    </style>
</head>
<body>
    <h3>🛠️ شات المهندس 🛠️</h3>
    <div id="chat"></div>
    <div class="controls">
        <input id="msg" placeholder="اكتب رسالتك هنا...">
        <button onclick="send()">إرسال</button>
    </div>

    <script>
        // الاتصال بالسيرفر
        const socket = io(); 
        
        // طلب الاسم وكلمة السر عند الدخول
        const name = prompt("أدخل اسمك:") || "زائر";
        const pass = prompt("أدخل كلمة السر (إذا كنت المدير):") || "";
        
        socket.emit('join', {name: name, pass: pass});

        function send() {
            const msgInput = document.getElementById('msg');
            if(msgInput.value.trim() !== "") {
                socket.emit('text', {msg: msgInput.value});
                msgInput.value = '';
            }
        }

        // استقبال الرسائل من السيرفر
        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            const adminClass = data.is_admin ? 'admin-name' : '';
            chat.innerHTML += `<div class="msg"><b class="${adminClass}">${data.sender}:</b> ${data.msg}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
