<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات المهندس</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 10px; height: 95vh; display: flex; flex-direction: column; }
        h3 { text-align: center; color: gold; margin-top: 5px; }
        #chat { flex-grow: 1; border: 1px solid #444; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #000; border-radius: 8px; }
        .controls { display: flex; gap: 5px; }
        input { flex-grow: 1; padding: 12px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #007bff; color: white; cursor: pointer; }
        .msg { margin: 8px 0; padding: 5px; border-bottom: 1px solid #333; }
        .admin-msg { background: rgba(255, 215, 0, 0.2); border-left: 3px solid gold; }
        .admin-name { color: gold !important; font-weight: bold; text-shadow: 0 0 5px gold; }
        .error-msg { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h3>🛠️ شات المهندس 🛠️</h3>
    <div id="chat"></div>
    <div class="controls">
        <input id="msg" placeholder="اكتب رسالتك هنا..." disabled>
        <button onclick="send()" disabled>إرسال</button>
    </div>

    <script>
        const socket = io();

        window.onload = function() {
            const name = prompt("🔹 يجب إدخال اسمك للدخول إلى الشات:", "زائر");
            if (!name) {
                alert("❌ يجب إدخال اسم للدخول!");
                window.location.reload();
                return;
            }

            const pass = prompt("🔹 أدخل كلمة السر (إذا كنت المدير):", "");
            socket.emit('join', {name: name, pass: pass});
        };

        function send() {
            const msgInput = document.getElementById('msg');
            if(msgInput.value.trim() !== "") {
                socket.emit('text', {msg: msgInput.value});
                msgInput.value = '';
            } else {
                alert("❌ لا يمكنك إرسال رسالة فارغة!");
            }
        }

        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            const adminClass = data.is_admin ? 'admin-name' : '';
            const msgClass = data.is_admin ? 'admin-msg' : data.color === "red" ? 'error-msg' : '';
            chat.innerHTML += `
                <div class="msg ${msgClass}">
                    <b class="${adminClass}">${data.sender}:</b> ${data.msg}
                </div>
            `;
            chat.scrollTop = chat.scrollHeight;

            // تفعيل زر الإرسال بعد الدخول
            document.querySelector('input').disabled = false;
            document.querySelector('button').disabled = false;
        });

        socket.on('kicked', () => {
            alert("❌ تم طردك من الشات!");
            window.location.reload();
        });
    </script>
</body>
</html>
