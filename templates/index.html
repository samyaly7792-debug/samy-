<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شات المهندس</title>
    <!-- استيراد مكتبة Socket.IO للاتصال الفعلي -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; }
        #chat { border: 1px solid #444; height: 300px; overflow-y: scroll; margin: 10px; padding: 10px; background: #222; text-align: right; }
        input { width: 70%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h1>🛠️ شات المهندس 🛠️</h1>
    <div id="chat"></div>
    <input id="msg" placeholder="اكتب رسالتك هنا...">
    <button onclick="send()">إرسال</button>

    <script>
        var socket = io(); // الاتصال بالسيرفر
        
        function send() {
            var msg = document.getElementById('msg').value;
            socket.emit('text', {msg: msg}); // إرسال الرسالة للسيرفر
            document.getElementById('msg').value = '';
        }

        // استقبال الرسائل من السيرفر
        socket.on('message', function(data) {
            var chat = document.getElementById('chat');
            chat.innerHTML += '<p><strong>' + data.sender + ':</strong> ' + data.msg + '</p>';
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
