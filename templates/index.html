<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شات المهندس</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 10px; }
        #messages { height: 250px; overflow-y: scroll; border: 1px solid #444; padding: 10px; }
        #user-list { color: #ffeb3b; }
    </style>
</head>
<body>
    <h2>شات المهندس</h2>
    <ul id="user-list"></ul>
    <div id="messages"></div>
    <input type="text" id="msg" placeholder="رسالتك...">
    <button onclick="send()">إرسال</button>

    <script>
        // إعداد الاتصال مع تعريف المسار الصحيح
        const socket = io({transports: ['websocket']});

        socket.on('connect', () => {
            document.getElementById('user-list').innerHTML = '<li>✅ متصل بالسيرفر</li>';
        });

        socket.on('user_list', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            for (let id in users) {
                list.innerHTML += '<li>👑 ' + users[id].name + '</li>';
            }
        });

        socket.on('message', (d) => {
            const div = document.createElement('div');
            div.innerHTML = '<b>' + d.sender + ':</b> ' + d.msg;
            document.getElementById('messages').appendChild(div);
        });

        function send() {
            const m = document.getElementById('msg');
            socket.emit('text', { msg: m.value });
            m.value = '';
        }
    </script>
</body>
</html>
