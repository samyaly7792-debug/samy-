<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دردشة المهندس</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div id="chat" style="height: 300px; overflow-y: scroll; border: 1px solid #ccc;"></div>
    <input id="msg" placeholder="اكتب رسالتك...">
    <button onclick="send()">إرسال</button>

    <script>
        // الاتصال بالسيرفر تلقائياً عبر الرابط الحالي
        const socket = io({transports: ['websocket']}); 
        
        const name = prompt("ادخل اسمك:") || "زائر";
        const pass = prompt("كلمة المرور (اختياري للمسؤول):") || "";
        
        socket.emit('join', {name: name, pass: pass});

        function send() {
            const msgInput = document.getElementById('msg');
            if(msgInput.value.trim() !== "") {
                socket.emit('text', {msg: msgInput.value});
                msgInput.value = '';
            }
        }

        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<p><b>${data.sender}:</b> ${data.msg}</p>`;
        });
    </script>
</body>
</html>
