<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- إصلاح منع التقريب والتبعيد نهائياً ليصبح كالتطبيق تماماً -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👑 شات المهندس 👑</title>
    <!-- استدعاء مكتبة السوكت لتوصيل الشات فورياً -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* منع تحديد النصوص أو ظهور التكبير باللمس المتكرر */
            touch-action: manipulation;
        }
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* منع السحب والاهتزاز في الهواتف */
            position: fixed;
            width: 100%;
        }
        /* واجهة الدخول */
        #login-screen {
            background: #111827;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #1f2937;
        }
        .welcome-title {
            color: #fbbf24;
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow: 0px 0px 8px rgba(251, 191, 36, 0.4);
        }
        .welcome-sub {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #374151;
            border-radius: 8px;
            background: #1f2937;
            color: #fff;
            outline: none;
            font-size: 16px;
            text-align: center;
        }
        input:focus {
            border-color: #fbbf24;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #fbbf24;
            color: #0b0f19;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #f59e0b;
        }
        /* واجهة الشات الرئيسية */
        #chat-screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            background: #0f172a;
            position: fixed;
            top: 0;
            left: 0;
        }
        header {
            background: #1e293b;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #fbbf24;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 12px;
            width: auto;
        }
        #messages-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
            position: relative;
        }
        .msg-sender {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 4px;
            display: block;
        }
        .msg-text {
            font-size: 15px;
        }
        /* تصميم خاص لرسائل المالك */
        .msg-admin {
            border-left: 4px solid #fbbf24;
            background: #1e1b12 !important;
        }
        .admin-tag {
            color: #fbbf24 !important;
            text-shadow: 0 0 5px rgba(251, 191, 36, 0.5);
        }
        /* نظام طرد وحظر للآدمن */
        .admin-actions {
            margin-top: 5px;
            display: flex;
            gap: 5px;
        }
        .kick-btn {
            background: #f97316;
            color: white;
            border: none;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }
        /* صندوق الإرسال */
        .input-area {
            padding: 15px;
            background: #1e293b;
            display: flex;
            gap: 10px;
            border-top: 1px solid #334155;
        }
        #message-input {
            flex-grow: 1;
            margin-bottom: 0;
            text-align: right;
        }
        #send-btn {
            width: auto;
            padding: 0 25px;
        }
    </style>
</head>
<body>

    <!-- 1. واجهة الدخول -->
    <div id="login-screen">
        <h2 class="welcome-title">✨ شـات المـهـنـدس ✨</h2>
        <p class="welcome-sub">أهلاً بك في فضاء الدردشة الآمنة</p>
        <input type="text" id="username-input" placeholder="أدخل اسمك المستعار..." required>
        <input type="password" id="password-input" placeholder="كلمة السر (اختياري للزوار)...">
        <button id="login-btn" onclick="login()">دخول الغرفة</button>
    </div>

    <!-- 2. واجهة الشات -->
    <div id="chat-screen">
        <header>
            <span id="chat-title">👑 شات المهندس 👑</span>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </header>
        <div id="messages-container"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        // هنا تم تعديل الترتيب ليقوم بالـ polling أولاً ثم الترقية لـ websocket لحل تعليق الجوالات
        const socket = io({
            transports: ['polling', 'websocket']
        });

        let currentUser = "";
        let isAdmin = false;

        // التحقق التلقائي عند فتح الصفحة (ميزة حفظ تسجيل الدخول)
        window.onload = function() {
            const savedUser = localStorage.getItem("username");
            const savedIsAdmin = localStorage.getItem("isAdmin");
            if (savedUser) {
                currentUser = savedUser;
                isAdmin = savedIsAdmin === "true";
                showChat();
                socket.emit('user_join', {username: currentUser, isAdmin: isAdmin});
            }
        }

        function login() {
            const username = document.getElementById("username-input").value.trim();
            const password = document.getElementById("password-input").value.trim();
            const loginBtn = document.getElementById("login-btn");

            if (!username) {
                alert("الرجاء إدخال اسم مستعار!");
                return;
            }

            // إظهار حالة جاري الدخول للتحقق
            loginBtn.innerText = "جاري الدخول...";
            loginBtn.disabled = true;

            // التحقق من هوية المالك
            if (username === "المهندس") {
                if (password === "Samy779h") {
                    isAdmin = true;
                } else {
                    alert("كلمة سر المالك غير صحيحة!");
                    loginBtn.innerText = "دخول الغرفة";
                    loginBtn.disabled = false;
                    return;
                }
            } else {
                isAdmin = false;
            }

            currentUser = username;
            localStorage.setItem("username", currentUser);
            localStorage.setItem("isAdmin", isAdmin);

            showChat();
            socket.emit('user_join', {username: currentUser, isAdmin: isAdmin});
            
            // إرجاع حالة الزر لطبيعتها
            loginBtn.innerText = "دخول الغرفة";
            loginBtn.disabled = false;
        }

        function showChat() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("chat-screen").style.display = "flex";
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function sendMessage() {
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (text) {
                socket.emit('new_message', {
                    username: currentUser,
                    text: text,
                    isAdmin: isAdmin
                });
                input.value = "";
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        // استقبال الرسائل من السيرفر وعرضها
        socket.on('message_received', function(data) {
            const container = document.getElementById("messages-container");
            const msgDiv = document.createElement("div");
            
            // تمييز رسائل المالك بتصميم فخم
            msgDiv.className = data.isAdmin ? "msg msg-admin" : "msg";
            
            let senderHTML = data.isAdmin ? `<span class="msg-sender admin-tag">👑 ${data.username} [مالك الشات]</span>` : `<span class="msg-sender">${data.username}</span>`;
            
            // إذا كنت أنت المالك (المهندس) والرسالة ليست لك، يظهر لك زر الطرد
            let adminActionHTML = "";
            if (isAdmin && data.username !== "المهندس") {
                adminActionHTML = `
                    <div class="admin-actions">
                        <button class="kick-btn" onclick="kickUser('${data.username}')">طرد المستخدم</button>
                    </div>
                `;
            }

            msgDiv.innerHTML = `
                ${senderHTML}
                <div class="msg-text">${data.text}</div>
                ${adminActionHTML}
            `;
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight; // النزول التلقائي لآخر رسالة
        });

        // أمر طرد مستخدم (خاص بالمالك)
        function kickUser(targetUser) {
            if (confirm(`هل أنت متأكد من طرد ${targetUser}؟`)) {
                socket.emit('kick_user', {target: targetUser});
            }
        }

        // استقبال أمر الطرد من السيرفر
        socket.on('user_kicked', function(data) {
            if (currentUser === data.target) {
                alert("لقد تم طردك من قبل مالك الشات!");
                logout();
            } else {
                // إظهار رسالة عامة للجميع بأنه تم طرد هذا الشخص
                const container = document.getElementById("messages-container");
                const systemMsg = document.createElement("div");
                systemMsg.style.color = "#ef4444";
                systemMsg.style.fontSize = "12px";
                systemMsg.style.textAlign = "center";
                systemMsg.style.margin = "10px 0";
                systemMsg.innerText = `🚨 تم طرد [${data.target}] لمخالفته القوانين.`;
                container.appendChild(systemMsg);
            }
        });
    </script>
</body>
</html>
