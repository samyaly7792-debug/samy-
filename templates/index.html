<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شات المهندس</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        #chat-ui { display: none; flex-direction: column; height: 100%; }
        #login-ui { padding: 20px; text-align: center; display: flex; flex-direction: column; gap: 10px; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; border-bottom: 1px solid #333; }
        #input-area { padding: 10px; display: flex; gap: 5px; background: #222; }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; cursor: pointer; border-radius: 5px; border: none; background: #00d4ff; }
        .admin-msg { color: gold; font-weight: bold; }
        .user-list-item { color: #00d4ff; padding: 5px; }
    </style>
</head>
<body>

    <div id="login-ui">
        <h2>شات المهندس</h2>
        <input id="nick" placeholder="اسمك">
        <input id="pass" type="password" placeholder="كلمة السر (اختياري)">
        <button onclick="join()">دخول</button>
    </div>

    <div id="chat-ui">
        <h3>المتصلون:</h3>
        <ul id="user-list"></ul>
        <div id="messages"></div>
        <div id="input-area">
            <input id="msg" placeholder="اكتب رسالتك...">
            <button onclick="send()">إرسال</button>
        </div>
    </div>

    <script>
        const socket = io();

        function join() {
            const name = document.getElementById('nick').value;
            const pass = document.getElementById('pass').value;
            if(name.trim() === "") { alert("يجب كتابة اسمك"); return; }
            // إرسال طلب الانضمام للسيرفر
            socket.emit('join', {name: name, pass: pass});
        }

        // استلام تأكيد الانضمام من السيرفر
        socket.on('join_success', (data) => {
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
        });

        socket.on('message', (d) => {
            const div = document.createElement('div');
            div.className = d.is_admin ? 'admin-msg' : '';
            div.innerHTML = `<b>${d.sender}:</b> ${d.msg}`;
            document.getElementById('messages').appendChild(div);
        });

        socket.on('user_list', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            for (let id in users) {
                list.innerHTML += `<li class="user-list-item">${users[id].name}</li>`;
            }
        });

        function send() {
            const m = document.getElementById('msg');
            if(m.value.trim() !== "") {
                socket.emit('text', {msg: m.value});
                m.value = '';
            }
        }
    </script>
</body>
</html>
