<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق المهندس</title>
    <style>
        /* تثبيت طول الصفحة لتكون بطول الشاشة بالكامل */
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden; /* لمنع أي تمرير غير مرغوب فيه */
            font-family: sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh; /* استخدام كامل ارتفاع الشاشة */
        }

        /* تنسيق التاج الذهبي */
        .header {
            text-align: center;
            padding: 10px;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            👑 </div>
        
        <div class="content">
            مرحباً بك في لوحة تحكم المهندس
        </div>
    </div>

</body>
</html>
