<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شات المهندس</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: Arial; padding: 10px; }
        #user-list { list-style: none; color: gold; font-weight: bold; }
        #messages { height: 200px; border: 1px solid #555; padding: 10px; margin: 10px 0; overflow-y: scroll; }
    </style>
</head>
<body>
    <h3>شات المهندس - المتصلون:</h3>
    <ul id="user-list"></ul>
    <div id="messages"></div>
    <input id="msg" placeholder="اكتب رسالتك...">
    <button onclick="send()">إرسال</button>

    <script>
        const socket = io();

        // 1. استقبال القائمة
        socket.on('user_list', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            for (let id in users) {
                list.innerHTML += '<li>👑 ' + users[id].name + '</li>';
            }
        });

        // 2. استقبال الرسائل
        socket.on('message', (d) => {
            const div = document.createElement('div');
            div.innerHTML = '<b>' + d.sender + ':</b> ' + d.msg;
            document.getElementById('messages').appendChild(div);
        });

        // 3. الإرسال
        function send() {
            const m = document.getElementById('msg');
            socket.emit('text', { msg: m.value });
            m.value = '';
        }
    </script>
</body>
</html>
