<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👑 شات المهندس 👑</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        /* (احتفظ بنفس تصميمك السابق هنا لضمان الشكل الجمالي) */
        body { background-color: #0b0f19; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #login-screen { text-align: center; width: 90%; max-width: 400px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        #chat-screen { display: none; width: 100%; height: 100vh; flex-direction: column; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>✨ شـات المـهـنـدس ✨</h2>
        <input type="text" id="username-input" placeholder="اسمك...">
        <input type="password" id="password-input" placeholder="كلمة السر...">
        <button id="login-btn" onclick="initChat()">دخول الغرفة</button>
    </div>

    <div id="chat-screen">
        <header>👑 شات المهندس 👑 <button onclick="location.reload()">خروج</button></header>
        <div id="messages-container" style="flex-grow:1; overflow-y:auto;"></div>
        <input type="text" id="message-input" placeholder="رسالتك...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        let socket;
        let currentUser = "";

        function initChat() {
            const username = document.getElementById("username-input").value.trim();
            const pass = document.getElementById("password-input").value.trim();
            const btn = document.getElementById("login-btn");

            if (!username) return alert("أدخل اسمك!");
            
            btn.innerText = "جاري الاتصال...";
            
            // إنشاء الاتصال فقط بعد ضغط الزر
            socket = io({ transports: ['websocket', 'polling'] });

            socket.on('connect', () => {
                currentUser = username;
                socket.emit('user_join', {username: username, isAdmin: (username === "المهندس" && pass === "Samy779h")});
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("chat-screen").style.display = "flex";
            });
        }

        function sendMessage() {
            const input = document.getElementById("message-input");
            socket.emit('new_message', {username: currentUser, text: input.value});
            input.value = "";
        }

        socket.on('message_received', (data) => {
            const div = document.createElement("div");
            div.innerText = `${data.username}: ${data.text}`;
            document.getElementById("messages-container").appendChild(div);
        });
    </script>
</body>
</html>
