<!DOCTYPE html>
<html style="height: 100%; overflow: hidden;">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* التصميم الثابت لمنع التمدد والانكماش */
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; background: #0f172a; color: white; font-family: sans-serif; }
        #chat-window { flex: 1; overflow-y: auto; padding: 10px; }
        #input-area { padding: 10px; background: #1e293b; display: flex; }
        .owner-gold { color: #FFD700; font-weight: bold; text-shadow: 0 0 5px #FFD700; }
    </style>
</head>
<body>
    <div id="chat-window"></div>
    <div id="input-area">
        <input id="msg" placeholder="اكتب رسالتك...">
        <button onclick="send()">إرسال</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        const socket = io();
        // عند استلام رسالة، نتحقق إذا كان المرسل هو المالك لنضيف التاج
        socket.on('message', function(data) {
            let chat = document.getElementById('chat-window');
            let div = document.createElement('div');
            if(data.is_owner) {
                div.innerHTML = `<span class="owner-gold">👑 ${data.username}: ${data.msg}</span>`;
            } else {
                div.textContent = `${data.username}: ${data.msg}`;
            }
            chat.appendChild(div);
        });
    </script>
</body>
</html>
